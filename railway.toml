[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway injects $PORT; the Dockerfile CMD honors it.
startCommand = "sh -c 'exec uvicorn provectus_analytics.api.main:app --host 0.0.0.0 --port ${PORT}'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# Hit the unauthenticated health endpoint to confirm the container is up.
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
